<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fluent · The AI Fluency Check</title>
<style>
:root{
  color-scheme:dark;
  --bg:#070512; --ink:#f4f2ff; --muted:#a9a6c9; --faint:#726f93;
  --glass:rgba(255,255,255,.055); --stroke:rgba(255,255,255,.12); --stroke2:rgba(255,255,255,.22);
  --delegation:#a78bff; --description:#34e0e0; --discernment:#ff6fa5; --diligence:#ffc24d;
  --tint:#a78bff;
  --sans:"Inter",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* calm, subtle background: a soft dimension-tinted glow at top, faint cool wash below */
.bg{position:fixed;inset:0;z-index:-3;background:
  radial-gradient(80vmax 60vmax at 20% -10%, color-mix(in srgb,var(--tint) 16%, transparent), transparent 60%),
  radial-gradient(70vmax 60vmax at 95% 110%, rgba(40,70,200,.10), transparent 62%),
  #08070f;
  transition:--tint .9s ease}
.grain{position:fixed;inset:0;z-index:-2;opacity:.025;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

.app{height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 18px 18px;overflow:hidden}
.top{width:100%;max-width:min(1180px,94vw);display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:18px}
.logo .o{width:24px;height:24px;border-radius:50%;background:conic-gradient(from 0deg,var(--delegation),var(--description),var(--discernment),var(--diligence),var(--delegation));box-shadow:0 0 18px color-mix(in srgb,var(--tint) 70%,transparent);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo b{background:linear-gradient(90deg,#fff,var(--muted));-webkit-background-clip:text;background-clip:text;color:transparent}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--muted);border:1px solid var(--stroke);background:var(--glass);padding:6px 11px;border-radius:999px;backdrop-filter:blur(8px);white-space:nowrap}
.progress{width:100%;max-width:min(1180px,94vw);height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-bottom:22px}
.progress>i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--tint),#fff);box-shadow:0 0 14px var(--tint);transition:width .5s cubic-bezier(.2,.8,.2,1)}

.stage{width:100%;max-width:min(1180px,94vw);flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column}
.screen{min-height:100%;display:flex;flex-direction:column;justify-content:flex-start;animation:enter .42s cubic-bezier(.2,.85,.2,1)}
.screen.fill{justify-content:flex-start}
.screen.fill .q{margin-top:0}
@keyframes enter{from{opacity:0;transform:translateY(18px) scale(.99)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--tint);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.eyebrow .d{width:9px;height:9px;border-radius:50%;background:var(--tint);box-shadow:0 0 12px var(--tint)}
.eyebrow .ct{margin-left:auto;color:var(--faint);letter-spacing:.12em}
h1{font-size:clamp(34px,7.5vw,58px);line-height:1.02;letter-spacing:-.03em;font-weight:820}
.big{font-size:clamp(26px,5vw,38px);line-height:1.12;letter-spacing:-.025em;font-weight:760}
.lede{font-size:clamp(17px,1.7vw,21px);color:var(--muted);line-height:1.55;margin-top:16px;max-width:68ch}
.q{font-size:clamp(24px,3.4vw,36px);line-height:1.18;letter-spacing:-.02em;font-weight:740}

.btn{appearance:none;font:inherit;font-weight:700;border:none;border-radius:15px;padding:15px 24px;cursor:pointer;color:#0a0716;background:linear-gradient(120deg,#fff,#e9e6ff);transition:transform .16s,box-shadow .25s,filter .2s;box-shadow:0 12px 34px color-mix(in srgb,var(--tint) 45%,transparent)}
.btn:hover{transform:translateY(-2px);filter:brightness(1.04);box-shadow:0 18px 44px color-mix(in srgb,var(--tint) 60%,transparent)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.4);box-shadow:none}
.btn.tint{background:linear-gradient(120deg,var(--tint),color-mix(in srgb,var(--tint) 50%,#fff));color:#0a0716}
.ghost{background:none;border:1px solid var(--stroke2);color:var(--ink);box-shadow:none;font-weight:600}
.ghost:hover{background:var(--glass);box-shadow:none}
.linkbtn{background:none;border:none;color:var(--muted);font:inherit;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.linkbtn:hover{color:var(--ink)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:24px}

.field{margin-top:18px}
.field label{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.inp{width:100%;margin-top:9px;background:var(--glass);border:1px solid var(--stroke);border-radius:15px;color:var(--ink);font-size:18px;padding:15px 17px;outline:none;transition:.2s}
.inp:focus{border-color:var(--tint);box-shadow:0 0 0 4px color-mix(in srgb,var(--tint) 22%,transparent)}
.inp::placeholder{color:var(--faint)}
textarea.inp{font-size:17px;min-height:120px;resize:vertical;line-height:1.5}
.hint{font-size:13px;color:var(--faint);margin-top:8px;display:flex;justify-content:space-between}

.seg{display:flex;gap:8px;margin-top:14px}
.seg button{flex:1;padding:15px 6px;border-radius:14px;border:1px solid var(--stroke);background:var(--glass);color:var(--muted);font-weight:700;font-size:17px;cursor:pointer;transition:.18s}
.seg button:hover{border-color:var(--stroke2);color:var(--ink);transform:translateY(-2px)}
.seg button.on{background:linear-gradient(120deg,var(--tint),color-mix(in srgb,var(--tint) 55%,#fff));color:#0a0716;border-color:transparent}
.seglab{display:flex;justify-content:space-between;font-size:13px;color:var(--faint);margin-top:9px}

.opts{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.opt{position:relative;text-align:left;border:1px solid var(--stroke);background:var(--glass);border-radius:15px;padding:15px 16px 15px 50px;color:var(--ink);font-size:16px;line-height:1.35;cursor:pointer;transition:transform .12s,border-color .18s,background .18s}
.opt:hover{transform:translateY(-2px);border-color:var(--stroke2);background:rgba(255,255,255,.08)}
.opt .k{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:25px;height:25px;border-radius:8px;border:1px solid var(--stroke2);display:grid;place-items:center;font-family:var(--mono);font-size:13px;color:var(--muted);transition:.2s}
.opt.correct{border-color:#34e08e;background:rgba(52,224,142,.16)}
.opt.correct .k{background:#34e08e;color:#062;border-color:transparent}
.opt.wrong{border-color:#ff6f8f;background:rgba(255,111,143,.15)}
.opt.wrong .k{background:#ff6f8f;color:#400;border-color:transparent}
.opt.dim{opacity:.45}
.opts.locked .opt{cursor:default;pointer-events:none}
@media(min-width:820px){.opt{font-size:17px}}
/* widescreen two-pane: question on the left, answers stacked on the right */
.qgrid{display:flex;flex-direction:column;gap:22px}
@media(min-width:820px){.qgrid{display:grid;grid-template-columns:.95fr 1.05fr;gap:48px;align-items:start;margin-top:8px}.qgrid .opts{margin-top:0}}

.diff{display:flex;align-items:center;gap:11px;margin-top:18px}
.diff .ticks{display:flex;gap:5px}
.diff .ticks i{width:26px;height:7px;border-radius:5px;background:rgba(255,255,255,.12);transition:.4s}
.diff .ticks i.on{background:var(--tint);box-shadow:0 0 10px var(--tint)}
.diff .lab{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}

.output{border:1px solid var(--stroke);border-left:3px solid var(--tint);border-radius:14px;padding:15px 17px;background:rgba(255,255,255,.04);margin-top:18px;font-size:15px;line-height:1.55;white-space:pre-wrap;color:#e9e7fb}
.output .ol{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.output .ol .dotai{width:7px;height:7px;border-radius:50%;background:var(--tint);box-shadow:0 0 8px var(--tint)}
.ctx{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.doc{border:1px solid var(--stroke);border-radius:12px;background:rgba(255,255,255,.035)}
.doc>summary{cursor:pointer;list-style:none;padding:11px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:9px}
.doc>summary::-webkit-details-marker{display:none}
.doc>summary::before{content:"▸";color:var(--tint);font-size:10px}
.doc[open]>summary::before{content:"▾"}
.docbody{padding:0 15px 13px;white-space:pre-wrap;font-size:13.5px;line-height:1.55;color:#dcdaf0;max-height:210px;overflow:auto}
.muted{color:var(--muted)}
/* role-discovery choices */
.choices{display:flex;flex-direction:column;gap:10px;margin-top:22px}
@media(min-width:820px){.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}}
.choice{text-align:left;border:1px solid var(--stroke);background:var(--glass);border-radius:15px;padding:16px 18px;color:var(--ink);font-size:17px;line-height:1.3;cursor:pointer;transition:transform .12s,border-color .18s,background .18s}
.choice:hover{transform:translateY(-2px);border-color:var(--stroke2);background:rgba(255,255,255,.08)}
.choice.other{color:var(--muted);font-weight:600;border-style:dashed}
/* scenario workspace */
.work{display:grid;grid-template-columns:1fr;gap:18px;margin-top:22px}
@media(min-width:900px){.work{grid-template-columns:1.05fr .95fr;gap:28px;align-items:start}}
.work-h{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:11px}
.work-h .muted{text-transform:none;letter-spacing:0}
.reslist{display:flex;flex-direction:column;gap:10px}
.rescard{border:1px solid var(--stroke);border-radius:14px;background:rgba(255,255,255,.035);padding:13px 14px;transition:border-color .18s,background .18s}
.rescard.on{border-color:var(--description);background:color-mix(in srgb,var(--description) 10%,transparent)}
.rc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.rc-name{font-weight:650;font-size:14.5px}
.rc-type{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);border:1px solid var(--stroke);border-radius:999px;padding:3px 8px;white-space:nowrap}
.rc-body{margin-top:9px;white-space:pre-wrap;font-size:13px;line-height:1.5;color:#cdcbe4;max-height:46px;overflow:hidden;cursor:pointer;-webkit-mask-image:linear-gradient(#000 55%,transparent);mask-image:linear-gradient(#000 55%,transparent)}
.rc-body.open{max-height:none;-webkit-mask-image:none;mask-image:none}
.rc-att{margin-top:11px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--stroke2);background:none;color:var(--ink);border-radius:10px;padding:7px 13px;transition:.15s}
.rescard.on .rc-att{border-color:var(--description);color:var(--description)}
.work-do{position:sticky;top:4px}
.drop{min-height:96px;border:1.5px dashed var(--stroke2);border-radius:14px;padding:13px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;transition:.18s}
.drop.over{border-color:var(--description);background:color-mix(in srgb,var(--description) 9%,transparent)}
.drop-empty{color:var(--faint);font-size:14px;align-self:center;margin:auto}
.chip-att{display:inline-flex;align-items:center;gap:9px;font-size:13px;background:color-mix(in srgb,var(--description) 14%,transparent);border:1px solid var(--description);color:#e6ffff;border-radius:999px;padding:6px 12px}
.chip-att b{cursor:pointer;color:var(--description);font-weight:800}
/* ===== scenario desktop ===== */
.brief{font-size:clamp(19px,2.1vw,26px);line-height:1.28;font-weight:730;letter-spacing:-.02em;max-width:62ch}
.desk{display:grid;grid-template-columns:1fr;gap:20px;margin-top:22px}
@media(min-width:940px){.desk{grid-template-columns:1.3fr .85fr;gap:24px;align-items:start}}
.win{border:1px solid var(--stroke);border-radius:16px;background:rgba(255,255,255,.03);overflow:hidden}
.winbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--stroke)}
.dots{display:flex;gap:6px}.dots i{width:11px;height:11px;border-radius:50%}
.dots i:nth-child(1){background:#ff6b6b99}.dots i:nth-child(2){background:#ffd16b99}.dots i:nth-child(3){background:#6bff9e99}
.wintitle{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wintabs{display:flex;gap:6px;padding:11px 12px 0}
.wtab{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:none;border:1px solid transparent;border-radius:10px 10px 0 0;padding:8px 14px;cursor:pointer}
.wtab.on{color:var(--ink);background:rgba(255,255,255,.05);border-color:var(--stroke);border-bottom-color:transparent}
.winbody{padding:14px;max-height:56vh;overflow:auto}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.tile{border:1px solid var(--stroke);border-radius:12px;background:rgba(255,255,255,.04);padding:14px 12px;cursor:pointer;transition:transform .12s,border-color .18s,background .18s;text-align:center;position:relative}
.tile:hover{transform:translateY(-3px);border-color:var(--stroke2);background:rgba(255,255,255,.07)}
.tile.on{border-color:var(--description);background:color-mix(in srgb,var(--description) 13%,transparent)}
.ticon{width:40px;height:50px;margin:2px auto 10px;display:block}
.tname{font-size:12.5px;font-weight:600;line-height:1.3;word-break:break-word}
.ttype{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:5px}
.tile .pin{position:absolute;top:7px;right:9px;font-size:10px;font-family:var(--mono);color:var(--description);opacity:0}
.tile.on .pin{opacity:1}
.mail{display:flex;flex-direction:column;gap:3px}
.mrow{display:flex;gap:12px;align-items:center;padding:11px 12px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
.mrow:hover{background:rgba(255,255,255,.05);border-color:var(--stroke)}
.mrow.on{border-color:var(--description);background:color-mix(in srgb,var(--description) 10%,transparent)}
.mdot{width:9px;height:9px;border-radius:50%;background:var(--description);flex:none}
.mfrom{font-weight:650;font-size:13.5px;width:120px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msub{font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.msnip{color:var(--faint);font-weight:400}
.dock{border:1px solid var(--stroke);border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));padding:16px;position:sticky;top:4px}
.dockhead{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;margin-bottom:12px}
.ai-ava{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 0deg,var(--delegation),var(--description),var(--discernment),var(--diligence),var(--delegation))}
.tray{min-height:70px;border:1.5px dashed var(--stroke2);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;transition:.18s;margin-bottom:12px}
.tray.over{border-color:var(--description);background:color-mix(in srgb,var(--description) 8%,transparent)}
.tray .empty{color:var(--faint);font-size:13px;margin:auto;text-align:center}
.fchip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;background:rgba(255,255,255,.06);border:1px solid var(--stroke2);border-radius:9px;padding:6px 10px}
.fchip svg{width:12px;height:15px;flex:none}
.fchip b{cursor:pointer;color:var(--muted);font-weight:700}
.dockinput{width:100%;background:rgba(0,0,0,.28);border:1px solid var(--stroke);border-radius:12px;color:var(--ink);font:inherit;font-size:16px;padding:13px 14px;min-height:120px;resize:vertical;outline:none;line-height:1.5}
.dockinput:focus{border-color:var(--description);box-shadow:0 0 0 3px color-mix(in srgb,var(--description) 20%,transparent)}
.dock .btn{margin-top:12px;width:100%}
/* modal file viewer */
.modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,3,10,.62);backdrop-filter:blur(5px)}
.modal.hide{display:none}
.mwin{width:min(720px,94vw);max-height:86vh;display:flex;flex-direction:column;border:1px solid var(--stroke2);border-radius:16px;background:#0d0b18;box-shadow:0 30px 90px rgba(0,0,0,.6);animation:enter .22s ease}
.mwin .winbar{justify-content:space-between}
.mwclose{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;line-height:1;padding:2px 6px}
.mwclose:hover{color:var(--ink)}
.mwbody{padding:20px 22px;overflow:auto;white-space:pre-wrap;font-size:15px;line-height:1.6;color:#e6e4f6}
.mwbody .mhead{font-family:var(--mono);font-size:12.5px;color:var(--faint);border-bottom:1px solid var(--stroke);padding-bottom:12px;margin-bottom:14px;white-space:pre-wrap}
.mwfoot{padding:13px 22px;border-top:1px solid var(--stroke);display:flex;justify-content:flex-end;gap:10px}
/* ===== TWO-MONITOR DESKTOP ===== */
.rig{display:grid;grid-template-columns:1fr;gap:18px;margin-top:18px}
@media(min-width:1000px){.rig{grid-template-columns:1.4fr 1fr;gap:20px;align-items:stretch}}
.monitor{border:1px solid var(--stroke2);border-radius:16px;background:#0b0a14;box-shadow:0 26px 64px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.03);overflow:hidden;display:flex;flex-direction:column;min-height:66vh}
.mtop{height:24px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--stroke)}
.desktop{position:relative;flex:1;overflow:hidden;background:
  radial-gradient(60vmax 42vmax at 22% -5%, color-mix(in srgb,var(--tint) 18%,transparent),transparent 60%),
  radial-gradient(54vmax 42vmax at 105% 105%, rgba(40,70,200,.18),transparent 60%),#0a0913}
.menubar{position:absolute;top:0;left:0;right:0;height:30px;display:flex;align-items:center;gap:18px;padding:0 14px;background:rgba(8,7,16,.55);backdrop-filter:blur(10px);border-bottom:1px solid var(--stroke);font-size:12px;color:var(--muted);z-index:6}
.menubar .mb-app{font-weight:700;color:var(--ink)}
.menubar .mb-clock{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.04em}
.deskicons{position:absolute;top:40px;left:14px;right:14px;display:grid;grid-template-columns:repeat(auto-fill,86px);gap:12px 14px;z-index:1}
.deskicon{width:92px;text-align:center;cursor:pointer;border-radius:10px;padding:8px 6px;transition:.14s;border:1px solid transparent}
.deskicon:hover{background:rgba(255,255,255,.07)}
.deskicon.on{background:color-mix(in srgb,var(--description) 16%,transparent);border-color:color-mix(in srgb,var(--description) 40%,transparent)}
.deskicon .ticon{width:44px;height:54px;margin:0 auto 7px;display:block;filter:drop-shadow(0 6px 12px rgba(0,0,0,.5))}
.deskicon .nm{font-size:11px;line-height:1.25;color:#e4e2f3;word-break:break-word;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.appwin{position:absolute;border:1px solid var(--stroke2);border-radius:12px;background:#11101d;box-shadow:0 26px 64px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;animation:winpop .2s ease}
@keyframes winpop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
.appwin .bar{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,.05);border-bottom:1px solid var(--stroke)}
.tl{display:flex;gap:7px}.tl i{width:12px;height:12px;border-radius:50%;cursor:pointer}
.tl .r{background:#ff5f57}.tl .y{background:#febc2e}.tl .g{background:#28c840}
.appwin .title{font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

<script>
/* ===================== MODEL ACCESS =====================
 Live AI runs three ways, in order: (1) inside Claude via window.cowork.askClaude,
 (2) your own API key for standalone hosting (fill MODEL_CONFIG.apiKey, or set window.FLUENT_API_KEY),
 (3) if neither is present, a built-in fallback scenario + heuristic scoring so it never breaks.
 NOTE: shipping a raw key in client code exposes it; for production, proxy the call. */
const MODEL_CONFIG={ apiKey:"", model:"claude-3-5-haiku-latest", maxTokens:800 };
function apiKey(){return MODEL_CONFIG.apiKey || (typeof window!=="undefined"&&window.FLUENT_API_KEY) || "";}
function liveMode(){return !!(window.cowork&&typeof window.cowork.askClaude==="function") || !!apiKey();}
async function callModel(prompt){
 // append a unique nonce so identical-looking prompts from a prior run are never served from cache
 const p=prompt+"\n\n<!-- req:"+Date.now().toString(36)+Math.random().toString(36).slice(2,10)+" (ignore) -->";
 try{
   if(window.cowork&&typeof window.cowork.askClaude==="function"){

     return typeof r==="string"?r:(r&&(r.text||r.content||r.completion))||String(r);
   }
   if(apiKey()){
     const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
       headers:{"content-type":"application/json","x-api-key":apiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
       body:JSON.stringify({model:MODEL_CONFIG.model,max_tokens:MODEL_CONFIG.maxTokens,messages:[{role:"user",content:p}]})});
     const j=await res.json();return (j.content&&j.content[0]&&j.content[0].text)||"";
   }
 }catch(e){/* fall through */}
 return null; // no model -> caller uses fallback
}
function parseJSON(s){if(!s)throw 0;let t=s.trim().replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();const a=t.indexOf("{"),b=t.lastIndexOf("}");if(a>=0)t=t.slice(a,b+1);return JSON.parse(t);}

/* ===================== 4D MODEL ===================== */
const DIMS={
 delegation:{label:"Delegation",c:"#a78bff",tag:"Knowing what to hand off",icon:'<svg viewBox="0 0 24 24"><path d="M7 4v6a4 4 0 0 0 4 4h6"/><path d="M14 11l3 3-3 3"/><circle cx="6" cy="4" r="1.6"/></svg>'},
 description:{label:"Description",c:"#34e0e0",tag:"Communicating what you want",icon:'<svg viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 3z"/><path d="M8 9h8M8 12h5"/></svg>'},
 discernment:{label:"Discernment",c:"#ff6fa5",tag:"Judging what comes back",icon:'<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M11 8v3l2 1"/><path d="M20 20l-4.5-4.5"/></svg>'},
 diligence:{label:"Diligence",c:"#ffc24d",tag:"Owning the outcome",icon:'<svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg>'}
};

 delegation:"Decide the human/AI split deliberately: hand off the legwork, keep the judgment.",

 {min:0,max:39,t:"Emerging",n:"You're getting value but mostly taking what the AI gives. The fastest gains come from treating outputs as drafts and pushing back."},

];

 d = difficulty 1 (easy) … 5 (expert). a = index of the correct option in authoring;

 {dim:"delegation",sub:"task fit",d:1,q:"Which task is the best fit to fully hand to an AI assistant?",opts:["Summarizing a long report into key points","Deciding which candidate gets the promotion","Approving the quarterly department budget","Signing off on a binding legal contract"],a:0},
 {dim:"delegation",sub:"how to use AI",d:1,q:"AI is generally best thought of as…",opts:["A collaborator that handles the legwork","A vending machine that hands you final answers","A replacement for doing your own thinking","A tool that just cleans up your spelling"],a:0},
 {dim:"delegation",sub:"first step",d:1,q:"A good first step before asking AI to help is to…",opts:["Get clear on what you actually want","Open a brand-new chat for a clean slate","Write the longest prompt you possibly can","Pick whichever model happens to be newest"],a:0},
 {dim:"delegation",sub:"automation",d:1,q:"“Automation” with AI mainly means it…",opts:["Performs a specific task you've defined","Gradually becomes self-aware over time","Learns to do your entire job for you","Takes over and replaces your whole team"],a:0},
 {dim:"delegation",sub:"good candidate",d:1,q:"A simple sign a task is a good fit for AI is that it's…",opts:["Repetitive and clearly defined","Emotionally sensitive and personal","Something only you can sign off on","Highly confidential and regulated"],a:0},
 {dim:"delegation",sub:"modalities",d:2,q:"Setting AI to produce a report every Monday unprompted is using it for…",opts:["Agency, where it acts on its own later","A single one-time automation","A way to type your draft faster","A substitute for your own judgment"],a:0},

/* ===================== ROLE DISCOVERY (branching, choice-led) ===================== */
const DISCO_MAX=4;
const DISCO_FALLBACK=[
 {q:"Which best describes your day-to-day?",choices:["Hands-on / technical work","Managing people or projects","Creating content or communications","Analysis, research, or strategy","Client- or customer-facing"]},
 {q:"What kind of organization do you work in?",choices:["Large corporation","Small business or startup","Government or public sector","Nonprofit or education","Self-employed / freelance"]},
 {q:"How often do you use AI today?",choices:["Most days","A few times a week","Now and then","Rarely, just getting started"]},
 {q:"When you reach for AI, it's mostly for…",choices:["Writing & communication","Research & summarizing","Analysis & data","Planning & organizing","Coding or technical work","Brainstorming ideas"]}
];
function discover(){ // start of a fresh run: clear anything that could carry over from a prior attempt
 S.disco={hist:[],step:0};S.roleSummary="";S.scenario=null;S.scenarioPromise=null;S.attached=[];S.docs=[];S.userPrompt="";S.shorts=[];S.used=[];ORDER.forEach(d=>S.obs[d]=[]);
 discoStep();
}
async function discoStep(){
 setTint("#a78bff");
 if(S.disco.step>=DISCO_MAX)return discoExtra();
 let step=null;
 if(liveMode()){
   loading(S.disco.step===0?"Thinking about what a "+(S.job||"…")+" actually does…":"Narrowing it down…");
   const hist=S.disco.hist.map(h=>`Q: ${h.q}\nA: ${h.a}`).join("\n");
   const out=await callModel(`A person is taking a short AI-fluency activity. Their job title: "${S.job||"unspecified"}". Conversation so far:\n${hist||"(none yet)"}\n\nAsk ONE more multiple-choice question that meaningfully narrows what they actually do, so we can build a realistic work scenario for them. Progression across steps: (1-2) narrow their specialization or focus within the role, (3) their work environment or sector, (4) how they use or feel about AI. This is step ${S.disco.step+1} of ${DISCO_MAX}. Use general knowledge to infer specific, sensible choices (e.g. if they said 'engineer', ask which kind). Return ONLY minified JSON: {"q":"one-line question, may reference your inference","choices":["3 to 5 concise options"]}. Do not add an 'other' option; the UI adds one.`);
   try{const j=parseJSON(out);if(j&&j.q&&Array.isArray(j.choices)&&j.choices.length)step={q:j.q,choices:j.choices.slice(0,5)};}catch(e){}
 }
 if(!step)step=DISCO_FALLBACK[Math.min(S.disco.step,DISCO_FALLBACK.length-1)];
 discoRender(step);
}
function discoRender(step){
 render(`
  <div class="eyebrow"><span class="d"></span>Getting to know your work<span class="ct">${S.disco.step+1}/${DISCO_MAX}</span></div>
  <div class="q">${esc(step.q)}</div>
  <div class="choices" id="ch">${step.choices.map((c,i)=>`<button class="choice" data-i="${i}">${esc(c)}</button>`).join("")}<button class="choice other" id="other">Something else / explain ›</button></div>
  <div id="otherWrap" class="hide" style="margin-top:12px">
   <textarea class="inp" id="otherTxt" maxlength="240" placeholder="In a few words, what do you do?"></textarea>
   <div class="row" style="margin-top:10px"><button class="btn tint" id="otherGo">Continue →</button></div>
  </div>`,'fill');
 const adv=(ans)=>{S.disco.hist.push({q:step.q,a:ans});S.disco.step++;bump();discoStep();};
 document.querySelectorAll("#ch .choice:not(.other)").forEach(b=>b.onclick=()=>adv(step.choices[+b.dataset.i]));
 document.getElementById("other").onclick=()=>{document.getElementById("otherWrap").classList.remove("hide");document.getElementById("otherTxt").focus();};
 document.getElementById("otherGo").onclick=()=>{const v=document.getElementById("otherTxt").value.trim();if(v.length<2)return;adv(v);};
}
function discoExtra(){
 setTint("#a78bff");
 render(`
  <div class="eyebrow"><span class="d"></span>One more, optional</div>
  <div class="q">Anything else you'd like to add about your work?</div>
  <p class="lede">The more specific you are, the better your scenario will fit your actual job. Tools you use, who you work with, what a typical task looks like, anything helps.</p>
  <div class="field"><textarea class="inp" id="extra" maxlength="600" placeholder="Optional. A sentence or two is plenty."></textarea></div>
  <div class="row"><button class="btn tint" id="xgo">Continue →</button><button class="linkbtn" id="xskip">skip</button></div>`,'');
 setTimeout(()=>{const e=document.getElementById("extra");if(e)e.focus();},120);
 const fin=()=>{const v=document.getElementById("extra").value.trim();if(v)S.disco.hist.push({q:"Anything else about your work",a:v});bump();discoFinish();};
 document.getElementById("xgo").onclick=fin;
 document.getElementById("xskip").onclick=()=>{bump();discoFinish();};
}
async function discoFinish(){
 if(liveMode()){
   const hist=S.disco.hist.map(h=>`${h.q} -> ${h.a}`).join("; ");
   const out=await callModel(`Job title: "${S.job}". Clarifying answers: ${hist}. In 2 sentences, describe this person's role, focus, work environment, and how they use AI, as context for generating a realistic work scenario for them. Output only the description.`);
   S.roleSummary=(out&&out.trim())||((S.job||"a professional")+". "+S.disco.hist.map(h=>h.a).join(", "));
 }else{S.roleSummary=(S.job||"a professional")+". "+S.disco.hist.map(h=>h.a).join(", ");}
 const used=S.disco.hist.map(h=>(h.a||"").toLowerCase()).join(" ");
 S.ability=/daily|most days|expert|every day/.test(used)?2.8:(/rarely|starting|now and then/.test(used)?1.6:2.2);
 prefetchScenario(); // build the scenario in the background while they take the quiz
 startRound();
}

/* ===================== ADAPTIVE QUESTION ROUND (20, CAT-lite) ===================== */
const ROUND_N=20;
function planDims(){ // cycle the four dimensions for even coverage (5 each over 20)
 const p=[];for(let r=0;r<ROUND_N/ORDER.length;r++)for(const d of ORDER)p.push(d);return p;
}
function shuffle(n){const a=[...Array(n).keys()];for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startRound(){S.plan=planDims();S.qIdx=0;nextQ();}
function pickQ(dim){
 const want=clamp(Math.round(S.ability),1,5); // target difficulty tracks ability
 let pool=BANK.filter(b=>b.dim===dim&&!S.used.includes(b));
 if(!pool.length)pool=BANK.filter(b=>!S.used.includes(b));
 if(!pool.length)return null;
 pool.sort((a,b)=>(Math.abs(a.d-want)-Math.abs(b.d-want))||(a.d-b.d));
 return pool[0];
}
function diffTicks(){const w=clamp(Math.round(S.ability),1,5);return `<div class="diff"><div class="ticks">${[1,2,3,4,5].map(n=>`<i class="${n<=w?'on':''}"></i>`).join("")}</div><span class="lab">difficulty ${w}/5</span></div>`;}
function nextQ(){
 if(S.qIdx>=ROUND_N){startScenario();return;}
 const dim=S.plan[S.qIdx];const it=pickQ(dim);if(!it){S.qIdx++;nextQ();return;}
 S.used.push(it);const D=DIMS[it.dim];setTint(D.c);
 const ord=shuffle(it.opts.length);              // shuffle so the answer isn't in a fixed slot
 const correctPos=ord.indexOf(it.a);
 render(`
  <div class="qgrid">
   <div class="qmain">
    <div class="eyebrow"><span class="d"></span>${D.label} · ${esc(it.sub)}<span class="ct">${S.qIdx+1}/${ROUND_N}</span></div>
    <div class="q">${esc(it.q)}</div>
    ${diffTicks()}
   </div>
   <div class="opts" id="opts">${ord.map((oi,pos)=>`<button class="opt" data-pos="${pos}"><span class="k">${"ABCD"[pos]}</span>${esc(it.opts[oi])}</button>`).join("")}</div>
  </div>`,'fill');
 const opts=document.getElementById("opts");
 const btns=[...opts.querySelectorAll(".opt")];
 btns.forEach(btn=>btn.onclick=()=>{
   opts.classList.add("locked");
   const pos=+btn.dataset.pos,correct=pos===correctPos;
   S.obs[it.dim].push({w:it.d,value:correct?1:0,ok:correct,edge:DIMS[it.dim].label+" — "+it.sub});
   btns.forEach((b,p)=>{if(p===correctPos)b.classList.add("correct");else if(p===pos)b.classList.add("wrong");else b.classList.add("dim");});
   const prev=Math.round(S.ability);
   S.ability=clamp(S.ability+(correct?0.8:-1.1),1,5); // climb on right, drop faster on wrong
   const now=Math.round(S.ability);
   if(correct&&now>prev)toast("Difficulty up → "+now+"/5");
   else if(!correct&&now<prev)toast("Easing off → "+now+"/5");
   S.qIdx++;bump();
   setTimeout(nextQ,620); // snappy
 });
}

/* ===================== SCENARIO (job-personalized, live draft) ===================== */
async function buildScenario(){
 if(liveMode()){
   const out=await callModel(`Build a realistic workplace scenario for this person, where they'd use an AI assistant to produce ONE deliverable.\nPerson: ${S.roleSummary||S.job||"a knowledge worker"}.\nReturn ONLY minified JSON: {"brief":"2 sentences, second person, with mild stakes and a deadline","task":"the deliverable, short noun phrase","resources":[ {"name":"realistic file name with a real extension (.docx,.pdf,.xlsx,.csv,.eml,.pptx)","type":"notes|style guide|schedule|email|transcript|data|example","relevant":true,"content":"FULL, realistic document content — multiple short paragraphs or bullet sections (roughly 8-16 lines), the way a real file would read, not a one-line summary","from":"(emails only) sender name","subject":"(emails only) subject line","date":"(emails only) short date"} ]}. Include 5-6 resources of MIXED types: at least one document (.docx/.pdf), at least one spreadsheet as comma-separated rows with a header line (type "data", .csv/.xlsx), and at least one email (type "email" with from/subject/date). Only SOME are relevant; include 1-2 convincing distractors marked relevant:false (an unrelated email thread, or confidential/unreleased material that must not be used). At least one relevant resource must contain a hard constraint or a specific fact. Make the content rich enough to read like a real file. Ground everything in this person's world. If any resource addresses the reader by name, use only "${S.name||'there'}" or "you" — never any other real person's name.`);
   try{const j=parseJSON(out);if(j&&j.task&&Array.isArray(j.resources)&&j.resources.length)return {brief:j.brief,task:j.task,resources:j.resources,fallbackDraft:null};}catch(e){}
 }
 return JSON.parse(JSON.stringify(FALLBACK_SCENARIO));
}
function prefetchScenario(){ // start building during the quiz so there's no wait at the end
 if(S.scenario||S.scenarioPromise)return;
 S.scenarioPromise=buildScenario().then(s=>{if(!S.scenario)S.scenario=s;}).catch(()=>{if(!S.scenario)S.scenario=JSON.parse(JSON.stringify(FALLBACK_SCENARIO));});
}
async function startScenario(){
 setTint("#34e0e0");
 if(!S.scenario){
   if(S.scenarioPromise){loading("Setting up your scenario…");try{await S.scenarioPromise;}catch(e){}}
   if(!S.scenario)S.scenario=await buildScenario();
 }
 scWorkspace();
}
function ctx(){if(!S.docs.length)return "";return `<div class="ctx">${S.docs.map(d=>`<details class="doc" open><summary>${esc(d.label)}</summary><div class="docbody">${esc(d.content)}</div></details>`).join("")}</div>`;}
function isMail(r){return /mail|email|eml|msg|inbox/.test(((r.type||"")+" "+(r.name||"")).toLowerCase());}
function mailFrom(r){if(r.from)return r.from;const n=(r.name||"")+" "+(r.type||"");if(/confidential|hiring|scope|hr|people/i.test(n))return "People Ops";if(/kickoff|client|requirement|customer/i.test(n))return "Client contact";if(/potluck|party|social|lunch|team/i.test(n))return "A teammate";if(/legal|compliance/i.test(n))return "Legal";return "Internal";}
function fileSVG(type){const t=(type||"").toLowerCase();
 if(/mail|email|eml|msg/.test(t))return '<svg class="ticon" viewBox="0 0 40 50" fill="none"><rect x="4" y="11" width="32" height="23" rx="3" stroke="#34e0e0" stroke-width="2"/><path d="M5 13l15 11 15-11" stroke="#34e0e0" stroke-width="2"/></svg>';
 if(/data|csv|sheet|xls/.test(t))return '<svg class="ticon" viewBox="0 0 40 50" fill="none"><rect x="6" y="4" width="28" height="42" rx="3" stroke="#35e3b4" stroke-width="2"/><path d="M6 18h28M6 31h28M16 8v38M26 8v38" stroke="#35e3b4" stroke-width="1.2" opacity=".7"/></svg>';
 if(/slide|ppt|deck/.test(t))return '<svg class="ticon" viewBox="0 0 40 50" fill="none"><rect x="5" y="9" width="30" height="21" rx="3" stroke="#ffc24d" stroke-width="2"/><path d="M11 35h18M14 41h12" stroke="#ffc24d" stroke-width="2"/></svg>';
 return '<svg class="ticon" viewBox="0 0 40 50" fill="none"><path d="M9 4h17l8 8v34H9z" stroke="#a78bff" stroke-width="2"/><path d="M26 4v8h8" stroke="#a78bff" stroke-width="2"/><path d="M14 23h12M14 29h12M14 35h8" stroke="#a78bff" stroke-width="1.5" opacity=".8"/></svg>';
}
function paras(s){return esc(s).split(/\n\n+/).map(p=>"<p>"+p.replace(/\n/g,"<br>")+"</p>").join("");}
function sheetHTML(r){const lines=(r.content||"").split("\n");const rows=lines.filter(l=>l.includes(","));const notes=lines.filter(l=>l.trim()&&!l.includes(","));
 if(!rows.length)return `<div class="page"><div class="meta">${esc(r.name)}</div>${paras(r.content)}</div>`;
 const head=rows[0].split(","),body=rows.slice(1);
 return `<div class="sheet"><table><thead><tr>${head.map(h=>`<th>${esc(h.trim())}</th>`).join("")}</tr></thead><tbody>${body.map(rw=>`<tr>${rw.split(",").map(c=>`<td>${esc(c.trim())}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`+(notes.length?`<div class="sheetnote">${paras(notes.join("\n"))}</div>`:"");
}
function emailHTML(r){const subj=r.subject||r.name.replace(/\.(eml|msg)$/i,"");
 return `<div class="emailv"><div class="ehead"><div class="subj">${esc(subj)}</div><div class="er"><b>From</b> ${esc(mailFrom(r))}</div><div class="er"><b>To</b> You</div>${r.date?`<div class="er"><b>Date</b> ${esc(r.date)}</div>`:""}</div>${paras(r.content)}</div>`;
}
function docView(i){const r=(S.scenario.resources||[])[i];const t=((r.type||"")+" "+(r.name||"")).toLowerCase();
 if(isMail(r))return emailHTML(r);
 if(/data|csv|xls|sheet/.test(t)&&/,/.test(r.content||""))return sheetHTML(r);
 if(/slide|ppt|deck|keynote/.test(t))return `<div class="slidev"><h4>${esc((r.subject||r.name).replace(/\.\w+$/,''))}</h4>${paras(r.content)}</div>`;
 const word=/docx|\.doc|word|brief|memo|notes/.test(t);
 return `<div class="page ${word?'word':''}"><div class="meta">${esc((r.type||'document'))} · ${esc(r.name)}</div>${paras(r.content)}</div>`;

function winLabel(id){if(id==="mail")return "✉ Mail";const r=(S.scenario.resources||[])[+id.split(":")[1]];return (r&&r.name)||"Window";}

 }

  <div class="deskicons">${icons}</div>${wins}${hint}
  <div class="taskbar"><span style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--faint)">OPEN</span>${tb}</div>`;
 desk.querySelectorAll(".deskicon").forEach(el=>{el.onclick=()=>openWin(el.dataset.open);el.addEventListener("dragstart",e=>e.dataTransfer.setData("text/plain",el.dataset.i||""));});
 desk.querySelectorAll(".tbitem").forEach(el=>el.onclick=()=>{S.win.min[el.dataset.restore]=false;focusWin(el.dataset.restore);});
 const hx=desk.querySelector("[data-hint]");if(hx)hx.onclick=()=>{S.hintDismissed=true;renderDesktop();};
 openWins.forEach(id=>{const w=desk.querySelector('.appwin[data-id="'+id+'"]');if(!w)return;
   w.addEventListener("mousedown",()=>{if(S.win.order[S.win.order.length-1]!==id)focusWin(id);});
   w.querySelectorAll("[data-close]").forEach(el=>el.onclick=e=>{e.stopPropagation();closeWin(el.dataset.close);});
   w.querySelectorAll("[data-min]").forEach(el=>el.onclick=e=>{e.stopPropagation();minWin(el.dataset.min);});
   w.querySelectorAll("[data-att]").forEach(el=>el.onclick=e=>{e.stopPropagation();const i=+el.dataset.att;if(!isNaN(i))scToggle(i);});
   w.querySelectorAll("[data-mail]").forEach(el=>el.onclick=()=>{S.win.mailsel=+el.dataset.mail;renderDesktop();});
 });
 tickClock();
}
/* ---- right monitor AI app ---- */
function aiAppHTML(){
 return `<div class="aiapp">
   <div class="aibody">
     <div class="aimsg">Hi${S.name?` ${esc(S.name)}`:""} — I'll help you put together <b>${esc((S.scenario&&S.scenario.task)||"your deliverable")}</b>. Bring over whatever I should work from on the left, then tell me what you need.</div>
   </div>
   <div class="aicompose"><div class="aiwrap" id="aiwrap">
     <div class="aichips" id="aidrop"></div>
     <textarea class="aiinput" id="ans" maxlength="3000" placeholder="Message fluent…"></textarea>
     <div class="airow"><button class="aiclip" title="Attach from your desktop"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11l-8.5 8.5a5 5 0 0 1-7-7L14 4a3.5 3.5 0 0 1 5 5l-8.5 8.5a2 2 0 0 1-3-3L15 6"/></svg></button><span class="hintx">drag files here to attach</span><button class="aisend" id="go" disabled>↑</button></div>
   </div></div>
 </div>`;
}
function refreshAI(){
 const R=(S.scenario&&S.scenario.resources)||[];const drop=document.getElementById("aidrop");if(!drop)return;
 drop.innerHTML=S.attached.length?S.attached.map(i=>`<span class="aichip">${fileSVG(R[i].type)} ${esc(R[i].name)} <b data-rm="${i}">✕</b></span>`).join(""):"";
 drop.querySelectorAll("b[data-rm]").forEach(x=>x.onclick=()=>scToggle(+x.dataset.rm));
 const go=document.getElementById("go"),ta=document.getElementById("ans");if(go&&ta)go.disabled=ta.value.trim().length<3;
}
function scToggle(i){const k=S.attached.indexOf(i);if(k>=0)S.attached.splice(k,1);else S.attached.push(i);renderDesktop();refreshAI();}
function wireAI(){
 const ta=document.getElementById("ans"),go=document.getElementById("go"),wrap=document.getElementById("aiwrap");
 ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,140)+"px";go.disabled=ta.value.trim().length<3;});
 wrap.addEventListener("dragover",e=>{e.preventDefault();wrap.classList.add("over");});
 wrap.addEventListener("dragleave",()=>wrap.classList.remove("over"));
 wrap.addEventListener("drop",e=>{e.preventDefault();wrap.classList.remove("over");const i=+e.dataTransfer.getData("text/plain");if(!isNaN(i)&&!S.attached.includes(i)){S.attached.push(i);renderDesktop();refreshAI();}});
 go.onclick=()=>{
   S.userPrompt=ta.value.trim();
   const R=S.scenario.resources||[];const rel=R.filter(r=>r.relevant),aRel=S.attached.filter(i=>R[i].relevant).length,aIrr=S.attached.filter(i=>!R[i].relevant).length;
   let v=rel.length?aRel/rel.length:0.5;v-=0.2*aIrr;v=clamp(v,0,1);
   S.obs.description.push({w:4,value:v,ok:v>=0.75,edge:"Description — give the AI the right context, and leave out the noise"});
   S.docs=S.attached.map(i=>({label:R[i].name,content:R[i].content}));
   clearInterval(_clk);bump();scGenDraft();
 };
 refreshAI();
}
function scWorkspace(){
 setTint("#34e0e0");
 const R=S.scenario.resources||[];const firstMail=R.findIndex(r=>isMail(r));
 S.win={order:firstMail>=0?["mail"]:[],min:firstMail>=0?{mail:true}:{},mailsel:firstMail>=0?firstMail:null};
 S.hintDismissed=false;
 render(`
  <div class="eyebrow"><span class="d"></span>Your scenario</div>
  <div class="brief">${esc(S.scenario.brief||"")}</div>
  <p class="lede">Your dual-monitor setup. The desktop is on the left with your files and inbox; the AI is on the right. Open what you need, hand the AI the right files, and write your prompt.</p>
  <div class="rig">
   <div class="mon"><div class="mscreen"><div class="mscreenIn"><div class="desktop" id="desktop"></div></div><span class="led"></span></div><div class="stand"></div><div class="standbase"></div><div class="monlabel">Display 1 · Desktop</div></div>
   <div class="mon"><div class="mscreen"><div class="mscreenIn">${aiAppHTML()}</div><span class="led"></span></div><div class="stand"></div><div class="standbase"></div><div class="monlabel">Display 2 · Assistant</div></div>
  </div>`);
 stage.classList.add("wide");
 wireAI();renderDesktop();startClock();
}
function scMcq(eyebrowDim,sub,q,opts,a,edge,next){
 const D=DIMS[eyebrowDim];setTint(D.c);
 const ord=shuffle(opts.length);const correctPos=ord.indexOf(a);
 render(`${ctx()}
  <div class="qgrid">
   <div class="qmain">
    <div class="eyebrow"><span class="d"></span>${D.label} · ${esc(sub)}</div>
    <div class="q">${esc(q)}</div>
   </div>
   <div class="opts" id="opts">${ord.map((oi,pos)=>`<button class="opt" data-pos="${pos}"><span class="k">${"ABCD"[pos]}</span>${esc(opts[oi])}</button>`).join("")}</div>
  </div>`,'fill');
 const el=document.getElementById("opts");const btns=[...el.querySelectorAll(".opt")];
 btns.forEach(btn=>btn.onclick=()=>{
   el.classList.add("locked");const pos=+btn.dataset.pos,correct=pos===correctPos;
   S.obs[eyebrowDim].push({w:4,value:correct?1:0,ok:correct,edge});
   btns.forEach((b,p)=>{if(p===correctPos)b.classList.add("correct");else if(p===pos)b.classList.add("wrong");else b.classList.add("dim");});
   bump();setTimeout(next,720);
 });
}
function scShort(sub,dim,ph,q,store,next){
 const D=DIMS[dim];setTint(D.c);
 render(`${ctx()}
  <div class="eyebrow"><span class="d"></span>${D.label} · ${esc(sub)}</div>
  <div class="q">${esc(q)}</div>
  <div class="field"><textarea class="inp" id="ans" maxlength="2000" placeholder="${esc(ph)}"></textarea>
   <div class="hint"><span>Write as much as you need. There's no length to hit.</span><span id="cc">0</span></div></div>
  <div class="row"><button class="btn tint" id="aN" disabled>Submit &nbsp;→</button></div>`);
 const ta=document.getElementById("ans"),btn=document.getElementById("aN"),cc=document.getElementById("cc");
 setTimeout(()=>ta.focus(),120);
 const grow=()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,360)+"px";};
 ta.addEventListener("input",()=>{cc.textContent=ta.value.length+" chars";btn.disabled=ta.value.trim().length<3;grow();});
 btn.onclick=()=>{store(ta.value.trim());bump();next();};
}
async function scGenDraft(){
 setTint("#34e0e0");
 const R=S.scenario.resources||[];
 const attachedText=S.attached.length?S.attached.map(i=>`[${R[i].name}]\n${R[i].content}`).join("\n\n"):"(the user attached no resources)";
 if(liveMode()){
   loading("The AI is drafting from your prompt…");
   const out=await callModel(`You are a capable AI assistant. The user's prompt:\n"""${S.userPrompt}"""\nThey attached these resources as your ONLY source material:\n${attachedText}\nProduce ${S.scenario.task} as a real assistant would on a first attempt, using only what was attached. If important context was not attached, do your best, and it may come out generic or slightly off. Concise (4-8 sentences or a short structure). If you address anyone by name, use only "${S.name||'there'}" or "you" — never any other real person's name. Output only the deliverable, no preamble.`);
   S.scenario.draft=(out&&out.trim())||S.scenario.fallbackDraft||FALLBACK_SCENARIO.fallbackDraft;
 }else{S.scenario.draft=S.scenario.fallbackDraft||FALLBACK_SCENARIO.fallbackDraft;}
 render(`
  <div class="eyebrow"><span class="d"></span>The AI's draft</div>
  <div class="big">Here's what your prompt produced.</div>
  ${ctx()}
  <div class="output"><div class="ol"><span class="dotai"></span>AI draft · from your prompt</div>${esc(S.scenario.draft)}</div>
  <p class="lede">Read it like it's about to go out the door.</p>
  <div class="row"><button class="btn tint" id="c">Continue &nbsp;→</button></div>`);
 document.getElementById("c").onclick=()=>{S.docs.push({label:"AI draft · from your prompt",content:S.scenario.draft});bump();scDiscern();}
}
function scDiscern(){
 scShort("Performance discernment","discernment",
  "Be specific.",
  "Look at the draft above. What would you check, fix, or push back on before using it?",
  v=>{S.shorts.push({dim:"discernment",sub:"Performance discernment",w:3,q:"What to check/fix in the draft",text:v,
    rubric:"Strong = names specific problems checked against the notes: unsupported or fabricated claims, missing/garbled facts, tone or constraint violations, things to verify. Partial = generic 'check the facts'. Weak = 'looks good' or style-only.",
    keys:["verify","check","source","claim","fact","wrong","missing","constraint","tone","against","unsupported","made up","number","stat"],
    edge:"Discernment: check the draft against your notes for unsupported claims and missing facts."});},
  scDiligence);
}
function scDiligence(){
 scShort("Creation diligence","diligence",
  "A sentence or two.",
  "Before this goes out as your work, what's your responsibility, and what would you verify or own?",
  v=>{S.shorts.push({dim:"diligence",sub:"Creation diligence",w:3,q:"Responsibility before it ships",text:v,
    rubric:"Strong = verify accuracy AND take ownership, protect any sensitive data, be transparent about AI's role where relevant. Partial = 'review it'. Weak = vague or hands it off.",
    keys:["verify","accurate","own","check","responsib","accountab","data","privacy","disclose","transparent","confirm","correct"],
    edge:"Diligence: verify accuracy and own what ships, don't outsource the responsibility."});},
  scDeploy);
}
function scDeploy(){
 scMcq("diligence","Deployment","If this became a task you do every week with AI, the best safeguard is to…",
  ["Define what a bad result looks like and add a human check there","Always switch to the newest model","Run it twice each time","Save the prompt in a doc"],0,
  "Diligence: build reused workflows around their failure point with a human check.",runScoring);
}

/* ===================== SCORING ===================== */
function heuristicShort(sh){const t=(sh.text||"").toLowerCase();if(t.trim().length<5)return 0;const hits=(sh.keys||[]).filter(k=>t.includes(String(k).toLowerCase())).length;if(hits>=2)return 2;if(hits>=1)return 1;return 0;}
async function judgeShorts(){
 const out={};
 if(liveMode()&&S.shorts.length){
   try{
     const body=S.shorts.map((s,i)=>`[${i}] ${s.dim}/${s.sub}\nQuestion: ${s.q}\nRubric: ${s.rubric}\nThe AI draft they're reacting to:\n${i===0?S.scenario.draft:"(see above)"}\nAnswer: ${JSON.stringify(s.text)}`).join("\n\n");
     const res=await callModel(`You are a fair but demanding judge of AI-collaboration skill. Score EACH answer 0, 1, or 2 by its rubric, judging the thinking, not grammar or length.\n0 = absent, wrong, vague, or restates the prompt. 1 = on the right track but generic or missing part of the rubric. 2 = clearly meets the full rubric with specificity; reserve it, only give 2 when the answer genuinely nails every required element.\nBe strict. Do not give 2 for partial answers. Return ONLY minified JSON mapping index to score, e.g. {"0":1,"1":2}.\n\n${body}`);
     const j=parseJSON(res);S.shorts.forEach((s,i)=>out[i]=clamp(j[String(i)],0,2));return out;
   }catch(e){}
 }
 S.shorts.forEach((s,i)=>out[i]=heuristicShort(s));return out;
}
function flagFor(v){return v>=0.72?"yes":(v>=0.45?"mid":"no");}
async function runScoring(){
 setTint("#a78bff");
 render(`<div class="center"><div class="eyebrow center" style="justify-content:center"><span class="d"></span>Reading how you collaborated</div><div class="coreS"><i></i><i></i><i></i></div><div class="big" id="sst">Scoring…</div></div>`);
 const msgs=["Weighing your judgment calls…","Grading your written answers…","Mapping the four dimensions…"];let mi=0;
 const tk=setInterval(()=>{const e=document.getElementById("sst");if(e)e.textContent=msgs[mi++%msgs.length];},950);
 const judged=await judgeShorts();
 S.shorts.forEach((s,i)=>{const v=(judged[i]||0)/2;S.obs[s.dim].push({w:s.w,value:v,ok:v>=0.75,edge:s.edge});});
 await new Promise(r=>setTimeout(r,500));clearInterval(tk);
 const dim={};ORDER.forEach(d=>{const o=S.obs[d];if(!o.length){dim[d]=0.5;return;}let p=0,m=0;o.forEach(x=>{m+=x.w;p+=x.w*x.value;});dim[d]=m?p/m:0.5;});
 const composite=Math.round(ORDER.reduce((s,d)=>s+dim[d],0)/ORDER.length*100);
 const level=LEVELS.find(l=>composite>=l.min&&composite<=l.max)||LEVELS[0];
 const missed=[];ORDER.forEach(d=>S.obs[d].forEach(x=>{if(!x.ok&&x.edge)missed.push({w:x.w,edge:x.edge,d});}));
 missed.sort((a,b)=>b.w-a.w);const edges=[];const seen=new Set();
 for(const m of missed){if(seen.has(m.edge))continue;seen.add(m.edge);edges.push(m);if(edges.length>=3)break;}
 S.result={dim,composite,level,edges};results();
}

/* ===================== RESULTS ===================== */
function gauge(){const r=84,C=2*Math.PI*r;return `<svg viewBox="0 0 200 200" style="width:200px;height:200px"><defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="var(--tint)"/></linearGradient><filter id="gl"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="100" cy="100" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="13"/><circle id="garc" cx="100" cy="100" r="${r}" fill="none" stroke="url(#gg)" stroke-width="13" stroke-linecap="round" filter="url(#gl)" transform="rotate(-90 100 100)" stroke-dasharray="${C}" stroke-dashoffset="${C}"/></svg>`;}
function countTo(el,to,ms){if(!el)return;let s=null;const step=t=>{if(!s)s=t;const p=Math.min(1,(t-s)/ms);el.textContent=Math.round(to*(0.5-0.5*Math.cos(p*Math.PI)));if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);}
function results(){
 const R=S.result;setTint("#a78bff");setProg(1);
 const byScore=ORDER.slice().sort((a,b)=>R.dim[b]-R.dim[a]);const hi=byScore[0],lo=byScore[byScore.length-1];
 const pillars=ORDER.map(d=>{const D=DIMS[d];const f=FLAGS[flagFor(R.dim[d])];const yes=flagFor(R.dim[d])==="yes";
   return `<div class="pillar" style="--c:${D.c}"><div class="nm"><span class="ic">${D.icon}</span>${D.label}</div><span class="flagchip ${f.cls}"><span class="fd" style="background:${yes?D.c:'currentColor'}"></span>${f.label}</span><small>${yes?STRENGTH[d]:GROWTH[d]}</small></div>`;}).join("");
 const edges=R.edges.length?R.edges.map(e=>`<div class="lever"><span class="dot" style="background:${DIMS[e.d].c}"></span><div>${esc(e.edge)}</div></div>`).join("")
   :`<div class="lever"><span class="dot" style="background:var(--diligence)"></span><div>You didn't miss much. Push into the hardest items and the rarest habits to keep growing.</div></div>`;
 render(`
  <div class="eyebrow center" style="justify-content:center"><span class="d"></span>${S.name?esc(S.name)+"'s ":""}AI Fluency Profile</div>
  <div class="hero"><div class="gauge">${gauge()}<div class="lbl"><b id="gnum">0</b><s>/ 100</s></div></div>
    <div><div class="levelTitle">${R.level.t}</div><p class="lede" style="margin-top:10px">${R.level.n}</p></div></div>
  <div class="pillars">${pillars}</div>
  <div class="card2"><h3>Your growth edges</h3>${edges}</div>
  <div class="card2"><h3>What stood out</h3>
    <div class="lever"><span class="dot" style="background:${DIMS[hi].c}"></span><div><b>Strongest: ${DIMS[hi].label}.</b> ${STRENGTH[hi]}</div></div>
    <div class="lever"><span class="dot" style="background:${DIMS[lo].c}"></span><div><b>Try next: ${DIMS[lo].label}.</b> ${GROWTH[lo]}</div></div></div>
  <div class="row" style="justify-content:center"><button class="btn tint" onclick="restart()">Take it again</button><button class="ghost btn" onclick="dl()">Download my result</button></div>
  <p class="disc center">Formative, not certified. Built on Anthropic's 4D AI Fluency Framework and its sub-competencies, plus adjacent fundamentals (how AI works, failure modes, ethics). An adaptive question round that escalates as you do well, then a scenario built around your job where the AI drafted from your own prompt. Dimensions shown as flags, not precise scores. Designed so a perfect score is rare for a human. ${liveMode()?"":"Offline preview — written answers scored by a built-in heuristic and the scenario uses a stock example; add an API key or run inside Claude for the live version."}</p>`);
 requestAnimationFrame(()=>{const arc=document.getElementById("garc");if(arc){const r=84,C=2*Math.PI*r;arc.style.transition="stroke-dashoffset 1.5s cubic-bezier(.2,.8,.2,1)";requestAnimationFrame(()=>arc.style.strokeDashoffset=C*(1-R.composite/100));}countTo(document.getElementById("gnum"),R.composite,1400);});
}
function dl(){const R=S.result;const flags={};ORDER.forEach(d=>flags[d]=FLAGS[flagFor(R.dim[d])].label);
 const out={tool:"Fluent — AI Fluency Check",at:new Date().toISOString(),name:S.name||null,job:S.job||null,composite:R.composite,level:R.level.t,dimensionFlags:flags,growthEdges:R.edges.map(e=>e.edge),mode:liveMode()?"live":"offline",
  note:"Built on Anthropic's 4D framework + sub-competencies. Adaptive question round + job-personalized scenario with a draft generated from the user's prompt. Formative; designed so a perfect score is rare."};
 const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:"application/json"}));a.download="ai-fluency-result.json";a.click();}
function restart(){S.name="";S.job="";S.roleSummary="";S.disco={hist:[],step:0};S.ability=2.2;S.qIdx=0;S.plan=[];S.used=[];S.shorts=[];S.scenario=null;S.scenarioPromise=null;S.attached=[];S.docs=[];S.userPrompt="";ORDER.forEach(d=>S.obs[d]=[]);S.result=null;DONE=0;intro();}

/* sample preview: strong-but-imperfect */
function sample(){
 ORDER.forEach(d=>S.obs[d]=[]);
 const seed={delegation:[[1,1],[3,1]],description:[[2,1],[3,0],[2,1]],discernment:[[1,1],[3,0],[3,.5],[3,1]],diligence:[[1,1],[3,1],[3,.5],[3,1]]};
 ORDER.forEach(d=>seed[d].forEach(([w,v])=>S.obs[d].push({w,value:v,ok:v>=0.75,edge:GROWTH[d]})));
 const dim={};ORDER.forEach(d=>{let p=0,m=0;S.obs[d].forEach(x=>{m+=x.w;p+=x.w*x.value;});dim[d]=p/m;});
 const composite=Math.round(ORDER.reduce((s,d)=>s+dim[d],0)/4*100);
 S.result={dim,composite,level:LEVELS.find(l=>composite>=l.min&&composite<=l.max)||LEVELS[0],
  edges:[{w:3,edge:"How AI works: fluent confidence is not evidence of truth.",d:"discernment"},{w:3,edge:"Discernment: check what a confident answer skipped.",d:"discernment"}]};
 results();
}

/* ===================== BOOT ===================== */
(function(){S.live=liveMode();document.getElementById("modeChip").textContent=liveMode()?"● live AI":"● offline preview";intro();})();
</script>
